<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel Conductor - Bus Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 16px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 16px 16px 0 0;
            margin: -16px -16px 0 -16px;
        }
        .driver-form { background: white; padding: 24px; border-radius: 16px; margin-top: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        .btn-start { background: #4CAF50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .active { background: #d4edda; color: #155724; }
        .inactive { background: #f8d7da; color: #721c24; }
        .info { background: #e3f2fd; padding: 16px; margin-top: 20px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚍 Panel Conductor</h1>
            <p>Comparte tu ubicación GPS</p>
        </div>
        
        <div class="driver-form">
            <div class="form-group">
                <label>Número de Bus:</label>
                <input type="text" id="busId" placeholder="Ej: BUS-01">
            </div>
            
            <div class="form-group">
                <label>Ruta:</label>
                <select id="routeName">
                    <option value="SIS">Ruta SIS</option>
                    <option value="Masaya-Managua">Ruta Masaya-Managua</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Tu Número:</label>
                <input type="tel" id="driverPhone" placeholder="Ej: 8888-8888">
            </div>
            
            <button onclick="iniciarSeguimiento()" id="startBtn" class="btn-start">▶️ INICIAR GPS</button>
            <button onclick="detenerSeguimiento()" id="stopBtn" class="btn-stop" style="display:none;">⏹️ DETENER</button>
            
            <div id="status" class="status inactive">
                ⚠️ No compartiendo ubicación
            </div>
        </div>
        
        <div class="info">
            <h3>📱 Instrucciones:</h3>
            <p>1. Permite el acceso a tu ubicación</p>
            <p>2. Presiona "INICIAR GPS"</p>
            <p>3. Mantén la página abierta mientras conduces</p>
        </div>
    </div>

    <script>
        let intervaloEnvio = null;
        let observadorGPS = null;
        let posicionActual = null;

        function iniciarSeguimiento() {
            const busId = document.getElementById('busId').value;
            const telefono = document.getElementById('driverPhone').value;
            
            if (!busId || !telefono) {
                alert('Completa todos los campos');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    posicionActual = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    enviarUbicacion();
                    
                    observadorGPS = navigator.geolocation.watchPosition(
                        (position) => {
                            posicionActual = {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude
                            };
                            enviarUbicacion();
                        },
                        (error) => console.error(error),
                        { enableHighAccuracy: true }
                    );
                    
                    intervaloEnvio = setInterval(() => enviarUbicacion(), 10000);
                    
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'block';
                    document.getElementById('status').className = 'status active';
                    document.getElementById('status').innerHTML = '✅ GPS ACTIVO';
                },
                (error) => {
                    alert('Error: Permite el acceso a la ubicación');
                }
            );
        }

        function enviarUbicacion() {
            if (!posicionActual) return;
            
            const datos = {
                bus_id: document.getElementById('busId').value,
                lat: posicionActual.lat,
                lng: posicionActual.lng,
                driver_phone: document.getElementById('driverPhone').value,
                route_name: document.getElementById('routeName').value
            };
            
            fetch('/api/update_location', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('status').innerHTML = '✅ Enviado ' + new Date().toLocaleTimeString();
                }
            })
            .catch(error => console.error('Error:', error));
        }

        function detenerSeguimiento() {
            if (observadorGPS) navigator.geolocation.clearWatch(observadorGPS);
            if (intervaloEnvio) clearInterval(intervaloEnvio);
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('status').className = 'status inactive';
            document.getElementById('status').innerHTML = '⚠️ GPS Detenido';
        }
    </script>
</body>
</html>
